name: Deploy to Railway

on:
  push:
    branches:
      - main   # deploy automatically on every push to main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Secrets (OSU_CLIENT_ID, OSU_CLIENT_SECRET, etc.) live ONLY in
      # GitHub → Settings → Secrets and variables → Actions.
      # They are injected at deploy time and never written to disk or logs.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
